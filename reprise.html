<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reprise de véhicule - L.E.J Autos</title>
</head>

<body>

<h1>🚗 Faire reprendre mon véhicule</h1>

<p>Remplissez ce formulaire, nous vous recontacterons rapidement.</p>

<form action="https://formsubmit.co/l.e.j.auto@hotmail.com" method="POST">

<input type="hidden" name="_subject" value="Nouvelle demande de reprise - L.E.J Autos">
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_next" value="https://lejautos.github.io/lejautos/">

<label>Nom :</label><br>
<input type="text" name="Nom" required><br><br>

<label>Téléphone :</label><br>
<input type="tel" name="Téléphone" required><br><br>

<label>Email :</label><br>
<input type="email" name="Email"><br><br>

<label>Immatriculation :</label><br>
<input type="text" name="Immatriculation" required><br><br>

<label>Marque :</label><br>
<input type="text" name="Marque"><br><br>

<label>Modèle :</label><br>
<input type="text" name="Modèle"><br><br>

<label>Année :</label><br>
<input type="number" name="Année"><br><br>

<label>Kilométrage :</label><br>
<input type="number" name="Kilométrage"><br><br>

<label>Carburant :</label><br>
<input type="text" name="Carburant"><br><br>

<label>Prix souhaité :</label><br>
<input type="text" name="Prix souhaité"><br><br>

<label>Commentaires :</label><br>
<textarea name="Commentaires" rows="5"></textarea><br><br>

<button type="submit">📩 Envoyer ma demande</button>

</form>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reprise de véhicule - L.E.J Autos</title>

<style>
body{
font-family:Arial,sans-serif;
background:#111;
color:white;
margin:0;
}

header{
background:#000;
padding:20px;
text-align:center;
}

h1{
color:#e30613;
}

.container{
max-width:700px;
margin:auto;
padding:30px;
}

.card{
background:#1d1d1d;
padding:25px;
border-radius:15px;
}

input,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
font-size:16px;
}

button{
background:#e30613;
color:white;
border:none;
padding:15px;
width:100%;
font-size:18px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#c10010;
}
</style>

</head>

<body>

<header>
<h1>Demande de reprise</h1>
</header>

<div class="container">

<div class="card">

<p>Vous souhaitez vendre votre véhicule ? Remplissez ce formulaire et nous vous recontacterons rapidement.</p>

<form action="mailto:l.e.j.auto@hotmail.com" method="post" enctype="text/plain">

<input type="text" name="Nom" placeholder="Nom et prénom" required>

<input type="tel" name="Téléphone" placeholder="Téléphone" required>

<input type="email" name="Email" placeholder="Adresse e-mail">

<input type="text" name="Marque" placeholder="Marque">

<input type="text" name="Modèle" placeholder="Modèle">

<input type="number" name="Année" placeholder="Année">

<input type="text" name="Kilométrage" placeholder="Kilométrage">

<textarea name="Description" rows="6" placeholder="Décrivez votre véhicule (état, options, défauts...)"></textarea>

<button type="submit">📩 Envoyer ma demande</button>

</form>

</div>

</div>

</body>
</html>
